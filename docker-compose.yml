services:
  postgres:
    image: postgres:16-alpine
    container_name: finace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finace
      POSTGRES_USER: finace
      POSTGRES_PASSWORD: finace_dev_password
    ports:
      - "5432:5432"
    volumes:
      - finace_pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finace-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  finace_pg_data:
