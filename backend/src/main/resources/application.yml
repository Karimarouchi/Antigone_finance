spring:
  application:
    name: finace
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finace?stringtype=unspecified}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:Karim123}
    hikari:
      maximum-pool-size: 15
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-placeholder}
            scope:
              - openid
              - profile
              - email

server:
  port: 8080
  forward-headers-strategy: framework
  compression:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change_me_dev_secret_change_me_dev_secret_change_me_dev_secret_chg}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:240}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:Antigone <noreply@localhost>}
  storage:
    path: ${STORAGE_PATH:./storage}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_BASE_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
    tn.antigone.finace: DEBUG
